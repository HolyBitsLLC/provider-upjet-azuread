on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag (e.g. v2.3.8-holybits). Overrides auto-detection."
        required: false
        type: string

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build provider binary
        run: |
          set -euo pipefail
          mkdir -p _output/linux_amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -v -o _output/linux_amd64/provider ./cmd/provider/
          ls -lh _output/linux_amd64/provider

      - name: Upload provider binary
        uses: actions/upload-artifact@v4
        with:
          name: provider-binary
          path: _output/linux_amd64/provider
          retention-days: 1

  image:
    name: Build and Push Container Image
    needs: [ci]
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      actions: read
      id-token: write
    runs-on:
      - self-hosted
      - linux
      - krubecible
      - holybits-shared
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          set -euo pipefail
          if command -v kubectl >/dev/null 2>&1; then exit 0; fi
          KUBECTL_VERSION="v1.31.2"
          ARCH="$(uname -m)"
          case "$ARCH" in
            aarch64|arm64) ARCH="arm64" ;;
            x86_64|amd64)  ARCH="amd64" ;;
          esac
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/kubectl" \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl"
          chmod +x "$HOME/.local/bin/kubectl"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install jq
        run: |
          set -euo pipefail
          if command -v jq >/dev/null 2>&1; then exit 0; fi
          curl -fsSL -o "$HOME/.local/bin/jq" \
            "https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64"
          chmod +x "$HOME/.local/bin/jq"

      - name: Verify Harbor push secret
        run: |
          kubectl -n github-actions-runners get secret harbor-push-secret -o name

      - name: Ensure envsubst is available
        run: |
          set -euo pipefail
          if command -v envsubst >/dev/null 2>&1; then
            echo "envsubst found: $(command -v envsubst)"
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq gettext-base
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache gettext
          else
            echo "::error::Cannot install envsubst (no apt-get or apk)"
            exit 1
          fi

      - name: Push via Kaniko K8s Job
        env:
          KANIKO_NS: github-actions-runners
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::12}"
          REPO_SHORT="${GITHUB_REPOSITORY##*/}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-${SHORT_SHA}"
          fi

          REGISTRY="harbor.dittmanfamily.com"
          REPO="holybitsllc/provider-azuread"
          IMAGE="${REGISTRY}/${REPO}:${VERSION}"

          SAFE_VER="$(echo "$VERSION" | tr '/' '-' | tr '.' '-')"
          JOB_NAME="kaniko-azuread-${SAFE_VER}-${SHORT_SHA}"

          echo "Version: $VERSION → ${IMAGE}"

          # Get the artifact download URL from the ci job
          ARTIFACTS_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts"
          ARTIFACT_ID="$(curl -sf -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            "${ARTIFACTS_URL}?name=provider-binary" | \
            jq -r '.artifacts[0].id')"
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "::error::Could not find provider-binary artifact"
            exit 1
          fi
          echo "Artifact ID: ${ARTIFACT_ID}"

          kubectl -n "$KANIKO_NS" delete job "$JOB_NAME" --ignore-not-found=true

          export GITHUB_REPOSITORY GITHUB_SHA REGISTRY REPO IMAGE REPO_SHORT JOB_NAME GH_TOKEN
          export ARTIFACT_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip"
          export GITHUB_TOKEN="${{ github.token }}"
          envsubst < cluster/images/provider-azuread/kaniko-job.yaml.tmpl \
            | kubectl -n "$KANIKO_NS" apply -f -

          deadline=$((SECONDS + 3600))
          while true; do
            if kubectl -n "$KANIKO_NS" wait --for=condition=complete --timeout=10s "job/${JOB_NAME}" 2>/dev/null; then
              echo "Kaniko job completed successfully"
              break
            fi
            failed="$(kubectl -n "$KANIKO_NS" get job "$JOB_NAME" -o jsonpath='{.status.failed}' 2>/dev/null || echo 0)"
            if [ "${failed:-0}" != "0" ]; then
              echo "::error::Kaniko job failed. Dumping logs."
              kubectl -n "$KANIKO_NS" logs "job/${JOB_NAME}" --all-containers=true || true
              exit 1
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Kaniko job exceeded 60m timeout."
              kubectl -n "$KANIKO_NS" logs "job/${JOB_NAME}" --all-containers=true || true
              exit 1
            fi
            sleep 15
          done

          kubectl -n "$KANIKO_NS" logs "job/${JOB_NAME}" --all-containers=true || true

      - name: Install crane and Crossplane CLI
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar xz -C "$HOME/.local/bin" crane
          curl -fsSL "https://releases.crossplane.io/stable/v2.2.0/bin/linux_amd64/crank" \
            -o "$HOME/.local/bin/crank"
          chmod +x "$HOME/.local/bin/crank"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build and push Crossplane package
        env:
          REGISTRY: harbor.dittmanfamily.com
          REPO: holybitsllc/provider-azuread
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::12}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-${SHORT_SHA}"
          fi

          IMAGE="${REGISTRY}/${REPO}:${VERSION}"
          echo "Packaging runtime image ${IMAGE} as Crossplane package"

          crane pull "${IMAGE}" /tmp/runtime.tar

          crank xpkg build \
            --package-root=. \
            --embed-runtime-image-tarball=/tmp/runtime.tar \
            --package-file=/tmp/provider.xpkg

          crane push /tmp/provider.xpkg "${IMAGE}"
          echo "Pushed Crossplane package to ${IMAGE}"

          crane push /tmp/provider.xpkg "${REGISTRY}/${REPO}:latest"
          echo "Pushed Crossplane package to ${REGISTRY}/${REPO}:latest"
