name: Build and Push Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build provider binary
        run: |
          mkdir -p _output/bin/linux_amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -o _output/bin/linux_amd64/provider ./cmd/provider/

  image:
    name: Build and Push Container Image
    needs: [ci]
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on:
      - self-hosted
      - linux
      - krubecible
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build provider binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -o _output/bin/linux_amd64/provider ./cmd/provider/

      - name: Prepare Docker build context
        run: |
          mkdir -p _output/build
          cp cluster/images/provider-azuread/Dockerfile _output/build/Dockerfile
          cp -r _output/bin _output/build/

      - name: Push to Harbor via Kaniko Job
        run: |
          set -euo pipefail
          KANIKO_NAMESPACE=github-actions-runners
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-12)
          job_name="kaniko-azuread-${SHORT_SHA}"

          cleanup() {
            kubectl -n "$KANIKO_NAMESPACE" delete job "$job_name" --ignore-not-found=true || true
          }
          trap cleanup EXIT

          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-${SHORT_SHA}"
          fi

          echo "Publishing version: $VERSION"

          sed \
            -e 's|${JOB_NAME}|'"${job_name}"'|g' \
            -e 's|${VERSION}|'"${VERSION}"'|g' \
            -e 's|${GITHUB_WORKSPACE}|'"${GITHUB_WORKSPACE}"'|g' \
            cluster/images/provider-azuread/kaniko-job.yaml \
            | kubectl -n "$KANIKO_NAMESPACE" apply -f -

          kubectl -n "$KANIKO_NAMESPACE" wait --for=condition=complete --timeout=600s "job/${job_name}" && exit 0
          kubectl -n "$KANIKO_NAMESPACE" logs "job/${job_name}"
          exit 1
