name: Build and Push Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag (e.g. v2.3.8-holybits). Overrides auto-detection."
        required: false
        type: string

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build provider binary
        run: |
          mkdir -p _output/bin/linux_amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -o _output/bin/linux_amd64/provider ./cmd/provider/

      - name: Upload provider binary
        uses: actions/upload-artifact@v4
        with:
          name: provider-binary
          path: _output/bin/

  image:
    name: Build and Push Container Image
    needs: [ci]
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on:
      - self-hosted
      - linux
      - krubecible
      - holybits-shared
    steps:
      - uses: actions/checkout@v4

      - name: Download provider binary
        uses: actions/download-artifact@v4
        with:
          name: provider-binary
          path: bin/

      - name: Build and push runtime image with Kaniko
        env:
          REGISTRY: harbor.dittmanfamily.com
          REPO: holybitsllc/provider-azuread
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::12}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-${SHORT_SHA}"
          fi

          IMAGE="${REGISTRY}/${REPO}:${VERSION}"

          # Set up Docker config auth for harbor
          HARBOR_AUTH=$(kubectl -n github-actions-runners get secret harbor-push-secret \
            -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d)
          mkdir -p /tmp/docker
          echo "$HARBOR_AUTH" > /tmp/docker/config.json

          echo "Building ${IMAGE} with Kaniko"

          docker run --rm \
            -v "$(pwd):/workspace" \
            -v /tmp/docker:/kaniko/.docker \
            gcr.io/kaniko-project/executor:v1.23.2 \
            --context=dir:///workspace \
            --dockerfile=/workspace/cluster/images/provider-azuread/Dockerfile.kaniko \
            --destination="${IMAGE}" \
            --destination="${REGISTRY}/${REPO}:latest" \
            --cache=true \
            --cache-repo="${REGISTRY}/holybitsllc/kaniko-cache/${GITHUB_REPOSITORY##*/}" \
            --cache-ttl=336h \
            --snapshot-mode=time

          echo "Runtime image pushed: ${IMAGE}"

      - name: Install crane and Crossplane CLI
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"

          CRANE_VERSION="v0.20.2"
          curl -fsSL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar xz -C "$HOME/.local/bin" crane

          CROSSPLANE_VERSION="v2.2.0"
          curl -fsSL "https://releases.crossplane.io/stable/${CROSSPLANE_VERSION}/bin/linux_amd64/crank" \
            -o "$HOME/.local/bin/crank"
          chmod +x "$HOME/.local/bin/crank"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build and push Crossplane package
        env:
          REGISTRY: harbor.dittmanfamily.com
          REPO: holybitsllc/provider-azuread
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::12}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-${SHORT_SHA}"
          fi

          IMAGE="${REGISTRY}/${REPO}:${VERSION}"
          echo "Packaging runtime image ${IMAGE} as Crossplane package"

          # Pull the runtime image from Harbor as an OCI tarball
          crane pull "${IMAGE}" /tmp/runtime.tar

          # Build the Crossplane xpkg package — embeds runtime image,
          # package.yaml, and CRDs into a proper OCI image with Crossplane
          # annotations that the package manager can extract.
          crank xpkg build \
            --package-root=. \
            --embed-runtime-image-tarball=/tmp/runtime.tar \
            --package-file=/tmp/provider.xpkg

          # Push the complete package back to Harbor, replacing the
          # runtime-only image.
          crane push /tmp/provider.xpkg "${IMAGE}"
          echo "Pushed Crossplane package to ${IMAGE}"

          # Also update the latest tag
          crane push /tmp/provider.xpkg "${REGISTRY}/${REPO}:latest"
          echo "Pushed Crossplane package to ${REGISTRY}/${REPO}:latest"
