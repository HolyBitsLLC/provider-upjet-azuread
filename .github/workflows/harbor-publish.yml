on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag (e.g. v2.3.8-holybits). Overrides auto-detection."
        required: false
        type: string

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build provider binary
        run: |
          set -euo pipefail
          mkdir -p _output/linux_amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -v -o _output/linux_amd64/provider ./cmd/provider/
          ls -lh _output/linux_amd64/provider

      - name: Upload provider binary
        uses: actions/upload-artifact@v4
        with:
          name: provider-binary
          path: _output/linux_amd64/provider
          retention-days: 1

  image:
    name: Build and Push Container Image
    needs: [ci]
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      actions: read
      id-token: write
    runs-on:
      - self-hosted
      - linux
      - krubecible
      - holybits-shared
    steps:
      - uses: actions/checkout@v4

      - name: Download provider binary
        uses: actions/download-artifact@v4
        with:
          name: provider-binary
          path: _output/linux_amd64

      - name: Install kubectl
        run: |
          set -euo pipefail
          if command -v kubectl >/dev/null 2>&1; then exit 0; fi
          KUBECTL_VERSION="v1.31.2"
          ARCH="$(uname -m)"
          case "$ARCH" in
            aarch64|arm64) ARCH="arm64" ;;
            x86_64|amd64)  ARCH="amd64" ;;
          esac
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/kubectl" \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl"
          chmod +x "$HOME/.local/bin/kubectl"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Harbor auth
        run: |
          set -euo pipefail
          DOCKER_CONFIG="${RUNNER_TEMP}/docker-auth"
          mkdir -p "$DOCKER_CONFIG"
          kubectl -n github-actions-runners get secret harbor-push-secret \
            -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d > "${DOCKER_CONFIG}/config.json"
          echo "Harbor auth written to ${DOCKER_CONFIG}/config.json"
          # Verify it has an auth entry
          python3 -c "import json; d=json.load(open('${DOCKER_CONFIG}/config.json')); print('Registries:', list(d.get('auths',{}).keys()))"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG}" >> "$GITHUB_ENV"

      - name: Install crane
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          if command -v crane >/dev/null 2>&1; then exit 0; fi
          curl -fsSL "https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar xz -C "$HOME/.local/bin" crane
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build and push container image
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::12}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-${SHORT_SHA}"
          fi

          REGISTRY="harbor.dittmanfamily.com"
          REPO="holybitsllc/provider-azuread"
          IMAGE="${REGISTRY}/${REPO}:${VERSION}"

          echo "Version: $VERSION → ${IMAGE}"

          # Create filesystem layer with binary and package metadata
          mkdir -p /tmp/layer/usr/local/bin /tmp/layer
          cp _output/linux_amd64/provider /tmp/layer/usr/local/bin/provider
          chmod +x /tmp/layer/usr/local/bin/provider
          cp package/crossplane.yaml /tmp/layer/package.yaml
          mkdir -p /tmp/layer/crds
          cp -r package/crds/. /tmp/layer/crds/ || true
          tar -cf /tmp/layer.tar -C /tmp/layer .
          ls -lh /tmp/layer.tar

          # Build image: alpine base + our provider layer → local tarball
          crane append \
            -b alpine:3.23.4 \
            -f /tmp/layer.tar \
            -t "temp" \
            -o /tmp/runtime.tar

          # Push to Harbor
          crane push /tmp/runtime.tar "${IMAGE}"
          crane push /tmp/runtime.tar "${REGISTRY}/${REPO}:latest"

          echo "Pushed ${IMAGE} and latest"

      - name: Install crank (Crossplane CLI)
        run: |
          set -euo pipefail
          if command -v crank >/dev/null 2>&1; then exit 0; fi
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://releases.crossplane.io/stable/v2.2.0/bin/linux_amd64/crank" \
            -o "$HOME/.local/bin/crank"
          chmod +x "$HOME/.local/bin/crank"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build and push Crossplane package
        env:
          REGISTRY: harbor.dittmanfamily.com
          REPO: holybitsllc/provider-azuread
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::12}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-${SHORT_SHA}"
          fi

          IMAGE="${REGISTRY}/${REPO}:${VERSION}"
          echo "Packaging runtime image ${IMAGE} as Crossplane package"

          # Build from a staging dir with only Crossplane manifests
          PKG_TMP="/tmp/xpkg-root"
          rm -rf "$PKG_TMP" && mkdir -p "$PKG_TMP"
          cp -r package "$PKG_TMP/"

          crank xpkg build \
            --package-root="$PKG_TMP" \
            --embed-runtime-image-tarball=/tmp/runtime.tar \
            --package-file=/tmp/provider.xpkg

          crane push /tmp/provider.xpkg "${IMAGE}"
          echo "Pushed Crossplane package to ${IMAGE}"

          crane push /tmp/provider.xpkg "${REGISTRY}/${REPO}:latest"
          echo "Pushed Crossplane package to ${REGISTRY}/${REPO}:latest"
