name: Publish Provider Package to Harbor

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use while publishing the package (e.g. v1.0.0-alpha.1)"
        default: ''
        required: false
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.25.11'
        required: false

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64, krubecible, holybits-shared]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ github.event.inputs.go-version }}
      
      - name: Build provider binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o _output/bin/linux_amd64/provider ./cmd/provider/
      
      - name: Prepare Docker build context
        run: |
          mkdir -p _output/build
          cp cluster/images/provider-azuread/Dockerfile _output/build/Dockerfile
          cp -r _output/bin _output/build/
      
      - name: Push to Harbor via Kaniko Job
        env:
          KANIKO_NAMESPACE: github-actions-runners
        run: |
          set -euo pipefail
          job_name="kaniko-azuread-provider-${GITHUB_SHA::12}"
          
          cleanup() {
            kubectl -n "$KANIKO_NAMESPACE" delete job "$job_name" --ignore-not-found=true || true
          }
          trap cleanup EXIT
          
          kubectl -n "$KANIKO_NAMESPACE" get secret harbor-push-secret > /dev/null 2>&1 || {
            echo "ERROR: harbor-push-secret not found"
            exit 1
          }
          
          VERSION="${{ github.event.inputs.version }}"
          
          kubectl apply -f - << KANIKO_JOB
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${job_name}
            namespace: ${KANIKO_NAMESPACE}
          spec:
            backoffLimit: 0
            template:
              spec:
                containers:
                - name: kaniko
                  image: gcr.io/kaniko-project/executor:v1.23.2
                  args:
                  - "--context=dir:///workspace/_output/build"
                  - "--dockerfile=Dockerfile"
                  - "--destination=harbor.dittmanfamily.com/holybitsllc/provider-azuread:${VERSION}"
                  - "--destination=harbor.dittmanfamily.com/holybitsllc/provider-azuread:latest"
                  - "--cache=true"
                  - "--cache-ttl=72h"
                  - "--snapshot-mode=redo"
                  volumeMounts:
                  - name: workspace
                    mountPath: /workspace
                  - name: harbor-push-secret
                    mountPath: /kaniko/.docker
                restartPolicy: Never
                volumes:
                - name: workspace
                  hostPath:
                    path: ${{ github.workspace }}
                - name: harbor-push-secret
                  secret:
                    secretName: harbor-push-secret
                    items:
                    - key: .dockerconfigjson
                      path: config.json
          KANIKO_JOB
          
          kubectl -n "$KANIKO_NAMESPACE" wait --for=condition=complete --timeout=600s "job/${job_name}" 2>/dev/null && exit 0
          kubectl -n "$KANIKO_NAMESPACE" logs "job/${job_name}"
          exit 1
