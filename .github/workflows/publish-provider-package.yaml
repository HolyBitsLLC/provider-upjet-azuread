name: Publish Provider Package to Harbor

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use while publishing the package (e.g. v1.0.0-alpha.1)"
        default: ''
        required: false
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.25.11'
        required: false

jobs:
  build:
    runs-on: [self-hosted, linux, x64, krubecible, holybits-shared]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ github.event.inputs.go-version }}
      
      - name: Build provider binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o _output/bin/linux_amd64/provider ./cmd/provider/
      
      - name: Prepare Docker build context
        run: |
          mkdir -p _output/build
          cp cluster/images/provider-azuread/Dockerfile _output/build/Dockerfile
          cp -r _output/bin _output/build/

  publish:
    needs: build
    uses: HolyBitsLLC/harvester-argo/.github/workflows/reusable-kaniko-build.yaml@main
    with:
      image: harbor.dittmanfamily.com/holybitsllc/provider-azuread
      dockerfile: _output/build/Dockerfile
      job-prefix: azuread-provider
      tags: "${{ github.event.inputs.version }},latest"
